# Tested on tmux 3.5a

set -g prefix C-j
unbind C-b

bind C-j send-prefix
bind e setw synchronize-panes
bind c new-window -c '#{pane_current_path}'
bind f run-shell 'fzf-tmux-switcher-ssh'
bind -n C-d detach-client

bind-key & kill-window
bind-key x kill-pane

set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g status-interval 1
set -g status-justify 'absolute-centre'
set -g status-style 'bg=default'
set -g status-left '#{prefix_highlight}'
set -g status-right '#[fg=#ffffff,bg=#3f3f3f] #S #[default]'
setw -g window-status-format '#[fg=#ffffff,bg=#3f3f3f] #{?window_bell_flag,!,-} #I:#W #[default]'
setw -g window-status-current-format '#[fg=#1e2030,bg=#8aadf4,bold] * #I:#W #[default]'
setw -g window-status-bell-style 'none'
set -g message-style 'fg=#ffffff,bg=default'
set -g pane-active-border-style 'fg=#8aadf4'
set -g mode-style 'fg=#ffffff,bg=default'

set -g popup-border-style 'fg=colour59'

set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}@#{?#{==:#{pane_current_path},#{HOME}},~,#{b:pane_current_path}}'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix ' '
set -g @prefix_highlight_fg '#1e2030'
set -g @prefix_highlight_bg '#8aadf4,bold'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e2030,bg=#8aadf4,bold'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr 'fg=#1e2030,bg=#8aadf4,bold'
set -g @prefix_highlight_empty_attr 'fg=#1e2030,bg=#8aadf4,bold'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_sync_prompt 'Sync'
set -g @prefix_highlight_empty_prompt ' TMUX '

set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind s
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '80%'

set -g @plugin 'lost-melody/tmux-command-palette'
set -g @cmdpalette-render-cmd 'bat -l md -f -pp'
set -g @cmdpalette-key-prefix 'prefix ?'

if 'test -f ~/.tmux.conf.local' 'source-file ~/.tmux.conf.local'

run '~/.tmux/plugins/tpm/tpm' # Keep this line at the end of conf.
